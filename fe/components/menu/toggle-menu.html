<!doctype html>
<html lang="ru">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      /* скрываем checkbox */
      #menu-toggle {
        display: none;
      }

      /* контейнер */
      .container {
        display: inline-block;
        cursor: pointer;
      }

      /* полоски */
      .bar1,
      .bar2,
      .bar3 {
        width: 35px;
        height: 5px;
        background-color: #333;
        margin: 6px 0;
        transition: 0.4s;
      }

      /* состояние checked */
      #menu-toggle:checked + .container .bar1 {
        transform: translate(0, 11px) rotate(-45deg);
      }

      #menu-toggle:checked + .container .bar2 {
        opacity: 0;
      }

      #menu-toggle:checked + .container .bar3 {
        transform: translate(0, -11px) rotate(45deg);
      }
    </style>
  </head>

  <body>
    <p>Click on the Menu Icon to transform it to "X":</p>
    <!-- скрытый чекбокс -->
    <input type="checkbox" id="menu-toggle" />
    <!-- через fo обращаемся к id="menu-toggle" -->
    <label class="container" for="menu-toggle">
      <div class="bar1"></div>
      <div class="bar2"></div>
      <div class="bar3"></div>
    </label>
  </body>
</html>
